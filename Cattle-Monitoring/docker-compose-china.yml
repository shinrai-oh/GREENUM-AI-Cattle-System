version: '3.8'

services:
  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/library/mysql:8.0
    container_name: cattle_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cattle123
      MYSQL_DATABASE: cattle_monitoring
      MYSQL_USER: cattle_user
      MYSQL_PASSWORD: cattle_pass
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/100_seed_data.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - cattle_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile-china
    container_name: cattle_backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      TZ: Asia/Shanghai
    ports:
      - "5001:5000"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cattle_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile-china
    container_name: cattle_frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cattle_network

volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local

networks:
  cattle_network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_icc: "true"
      com.docker.network.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"
