services:
  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: cattle_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: cattle123
      MYSQL_DATABASE: cattle_monitoring
      MYSQL_USER: cattle_user
      MYSQL_PASSWORD: cattle_pass
      # Windows兼容性设置
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Windows路径兼容性 - 使用相对路径
      - ./database/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/100_seed_data.sql:ro
    networks:
      - cattle_network
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "cattle_user", "-pcattle_pass"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  # 后端Python Flask服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cattle_backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_PORT=5000
      - DATABASE_URL=mysql+pymysql://cattle_user:cattle_pass@mysql:3306/cattle_monitoring?charset=utf8mb4
      # Windows兼容性环境变量
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # Windows开发模式下的卷挂载（可选）
      # - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - cattle_network
    healthcheck:
      # 使用python进行健康检查，容器内未安装curl
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 60s

  # 前端Vue.js服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cattle_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      # Windows兼容性环境变量
      - TZ=Asia/Shanghai
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cattle_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s

volumes:
  mysql_data:
    driver: local
  backend_logs:
    driver: local

networks:
  cattle_network:
    driver: bridge
    # Windows Docker Desktop 优化
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"
