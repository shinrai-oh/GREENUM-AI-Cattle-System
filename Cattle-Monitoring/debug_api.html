<!DOCTYPE html>
<html>
<head>
    <title>API Debug Test</title>
</head>
<body>
    <h1>API Debug Test</h1>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            try {
                const response = await fetch('/api/v1/statistics/cattle/176/history');
                const data = await response.json();
                
                console.log('Raw response:', data);
                console.log('Data keys:', Object.keys(data));
                console.log('Data.data keys:', Object.keys(data.data));
                console.log('Daily statistics length:', data.data.daily_statistics.length);
                
                document.getElementById('result').innerHTML = `
                    <h2>API Response:</h2>
                    <p>Success: ${data.success}</p>
                    <p>Daily Statistics Length: ${data.data.daily_statistics.length}</p>
                    <pre>${JSON.stringify(data.data.daily_statistics.slice(0, 2), null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
