events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 统一字符集设置，包含 JSON 类型
    charset utf-8;
    charset_types text/plain text/css application/json application/javascript application/xml text/xml;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;
        root         /usr/share/nginx/html;
        index        index.html;

        # 处理Vue Router的history模式
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API代理到后端
        # 使用变量让 Nginx 在请求时解析 DNS，而非启动时
        location /api/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $backend http://unified-backend:3000;
            proxy_pass $backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            # 确保下游未设置 charset 时，仍返回 UTF-8
            default_type application/json;
        }

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
